<!DOCTYPE html>

<style>
:root{
  --surface:#fcfcfb; --panel:#ffffff; --ink:#0b0b0b; --ink2:#52514e; --ink3:#8a887f;
  --line:#e7e6e1; --brand:#16324f; --brand2:#1d4568; --accent:#2a78d6; --accent2:#eb6834;
  --good:#008300; --warn:#c98500; --gold:#c9a227;
  --r:10px; --shadow:0 1px 3px rgba(0,0,0,.07),0 4px 14px rgba(0,0,0,.05);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font:15px/1.5 -apple-system,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--surface);color:var(--ink)}
header{background:var(--brand);color:#fff;padding:14px 22px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
header h1{font-size:19px;font-weight:700;letter-spacing:.02em}
header .sub{font-size:12px;opacity:.75}
nav{display:flex;gap:4px;background:var(--brand2);padding:6px 16px;flex-wrap:wrap;position:sticky;top:0;z-index:50}
nav button{background:transparent;border:0;color:#cfe0f0;padding:9px 16px;font-size:14px;font-weight:600;border-radius:8px;cursor:pointer}
nav button.on{background:#fff;color:var(--brand)}
main{max-width:1180px;margin:0 auto;padding:26px 20px 80px}
.grid{display:grid;gap:16px}
.tiles{grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
.tile{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow)}
.tile .k{font-size:12px;color:var(--ink2);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.tile .v{font-size:26px;font-weight:750;margin-top:2px}
.tile .d{font-size:12px;color:var(--ink3)}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:20px;box-shadow:var(--shadow)}
.card h2{font-size:16px;margin-bottom:12px}
.card h3{font-size:14px;margin:14px 0 8px;color:var(--ink2)}
.row{display:flex;gap:14px;flex-wrap:wrap}
.row>*{flex:1;min-width:180px}
label{font-size:12px;font-weight:600;color:var(--ink2);display:block;margin-bottom:3px}
input,select,textarea{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:8px;font:inherit;background:#fff}
input:focus,select:focus{outline:2px solid var(--accent);outline-offset:0;border-color:transparent}
button.btn{background:var(--brand);color:#fff;border:0;border-radius:8px;padding:10px 18px;font:600 14px/1 inherit;cursor:pointer}
button.btn.sec{background:#eef1f4;color:var(--brand)}
button.btn.sm{padding:6px 12px;font-size:13px}
table{width:100%;border-collapse:collapse;font-size:14px}
th{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink2);text-align:left;padding:8px;border-bottom:2px solid var(--line)}
td{padding:8px;border-bottom:1px solid var(--line)}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
.chip{display:inline-block;padding:2px 10px;border-radius:999px;font-size:12px;font-weight:650}
.chip.res{background:#e3edfa;color:#1c5cab}.chip.com{background:#fde9df;color:#b34515}
.chip.ok{background:#e3f2e3;color:var(--good)}.chip.pend{background:#fdf3dd;color:#8a6100}
.mathbox{background:#f6f8fa;border:1px solid var(--line);border-radius:8px;padding:14px;font-variant-numeric:tabular-nums}
.mathbox .mr{display:flex;justify-content:space-between;padding:3px 0;font-size:14px}
.mathbox .mr.tot{border-top:2px solid var(--ink);margin-top:6px;padding-top:8px;font-weight:750;font-size:16px}
.mathbox .mr .lbl{color:var(--ink2)}
.slider-row{display:flex;align-items:center;gap:12px}
input[type=range]{accent-color:var(--brand);padding:0}
.opt3{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-top:10px}
.opt{border:2px solid var(--line);border-radius:var(--r);padding:14px}
.opt.rec{border-color:var(--gold)}
.opt .tier{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink2)}
.opt .price{font-size:22px;font-weight:750;margin:4px 0}
.opt .vv{font-size:13px;color:var(--ink2);margin-top:6px}
.note{font-size:12px;color:var(--ink3);margin-top:8px}
.footer{max-width:1180px;margin:30px auto 0;padding:0 20px;font-size:12px;color:var(--ink3);text-align:center}
.footer b{color:var(--gold)}
.viz{position:relative}
.viz svg{width:100%;height:auto;display:block}
.tt{position:absolute;pointer-events:none;background:#fff;border:1px solid var(--line);box-shadow:var(--shadow);border-radius:8px;padding:8px 10px;font-size:12px;display:none;z-index:5;white-space:nowrap}
.legend{display:flex;gap:16px;font-size:13px;color:var(--ink2);margin-bottom:6px}
.legend .sw{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:5px;vertical-align:-1px}
.pillL{border-left:4px solid var(--accent);padding-left:10px}
.hide{display:none!important}
.checklist{columns:2;gap:24px;font-size:13.5px}
.checklist li{margin:0 0 6px 18px;break-inside:avoid}
@media(max-width:700px){.checklist{columns:1}}
.demo-banner{background:#fdf3dd;border:1px solid #e8d59a;color:#6b4d00;border-radius:8px;padding:8px 14px;font-size:13px;margin-bottom:18px}
</style>

let qState = { pillar:'aor', equip:[], matCost:0, laborHrs:0, rentCost:0, gm:CFG.gmDefaults.aor, cust:'' };
function quoteMath(equipCost, matCost, laborHrs, rentCost, gm){
  const eqTax = equipCost * (1+CFG.taxRate);
  const matTax = matCost * (1+CFG.taxRate);
  const matSur = matTax * CFG.matSurcharge;
  const rentTax = rentCost * (1+CFG.taxRate);
  const materialsTotal = matSur + eqTax + rentTax;         // (Q6*1.18)+Q5+Q7
  const labor = laborHrs * CFG.laborRate;
  const laborOH = labor * CFG.laborOverhead;               // Q9*1.6
  const totalCost = materialsTotal + laborOH;              // Q11+Q8
  const bid = totalCost / (1 - gm);                        // P12/(1-GM)
  return {eqTax, matTax, matSur, rentTax, materialsTotal, labor, laborOH, totalCost, bid, profit: bid-totalCost};
}

/* --- trend chart (SVG, crosshair tooltip, direct labels) --- */
function drawTrend(){
  const el = document.getElementById('trendviz'); if(!el) return;
  const W=980,H=300,L=46,R=90,T=14,B=30;
  const max=160;
  const x=i=>L+(W-L-R)*(i/(trend.months.length-1));
  const y=v=>T+(H-T-B)*(1-v/max);
  const path=a=>a.map((v,i)=>`${i?'L':'M'}${x(i).toFixed(1)},${y(v).toFixed(1)}`).join('');
  let grid='';
  for(const g of [0,40,80,120,160]) grid+=`<line x1="${L}" x2="${W-R}" y1="${y(g)}" y2="${y(g)}" stroke="#eceae4"/><text x="${L-8}" y="${y(g)+4}" text-anchor="end" font-size="11" fill="#8a887f">${g}</text>`;
  let ticks='';
  trend.months.forEach((mo,i)=>{ ticks+=`<text x="${x(i)}" y="${H-8}" text-anchor="middle" font-size="11" fill="#8a887f">${mo}</text>`; });
  el.innerHTML = `<svg viewBox="0 0 ${W} ${H}" id="trendsvg">
    ${grid}${ticks}
    <path d="${path(trend.res)}" fill="none" stroke="#2a78d6" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="${path(trend.com)}" fill="none" stroke="#eb6834" stroke-width="2.5" stroke-linejoin="round"/>
    <text x="${W-R+8}" y="${y(trend.res[11])+4}" font-size="12" font-weight="600" fill="#0b0b0b">Residential</text>
    <text x="${W-R+8}" y="${y(trend.com[11])+4}" font-size="12" font-weight="600" fill="#0b0b0b">Commercial</text>
    <line id="xh" y1="${T}" y2="${H-B}" stroke="#b9b7ae" stroke-dasharray="3,3" style="display:none"/>
    <circle id="d1" r="4.5" fill="#2a78d6" stroke="#fff" stroke-width="2" style="display:none"/>
    <circle id="d2" r="4.5" fill="#eb6834" stroke="#fff" stroke-width="2" style="display:none"/>
    <rect x="${L}" y="${T}" width="${W-L-R}" height="${H-T-B}" fill="transparent" id="hit"/>
  </svg>`;
  const svg=document.getElementById('trendsvg'), tt=document.getElementById('tt');
  const hit=document.getElementById('hit');
  hit.addEventListener('mousemove',ev=>{
    const pt=svg.createSVGPoint(); pt.x=ev.clientX; pt.y=ev.clientY;
    const p=pt.matrixTransform(svg.getScreenCTM().inverse());
    const i=Math.max(0,Math.min(11,Math.round((p.x-L)/((W-L-R)/11))));
    document.getElementById('xh').setAttribute('x1',x(i)); document.getElementById('xh').setAttribute('x2',x(i));
    document.getElementById('xh').style.display='block';
    const d1=document.getElementById('d1'), d2=document.getElementById('d2');
    d1.setAttribute('cx',x(i)); d1.setAttribute('cy',y(trend.res[i])); d1.style.display='block';
    d2.setAttribute('cx',x(i)); d2.setAttribute('cy',y(trend.com[i])); d2.style.display='block';
    tt.style.display='block'; tt.style.left=(ev.pageX+14)+'px'; tt.style.top=(ev.pageY-10)+'px';
    tt.innerHTML=`<b>${trend.months[i]}</b><br><span style="color:#2a78d6">●</span> Residential: $${trend.res[i]}K<br><span style="color:#eb6834">●</span> Commercial: $${trend.com[i]}K`;
  });
  hit.addEventListener('mouseleave',()=>{ tt.style.display='none';
    ['xh','d1','d2'].forEach(id=>document.getElementById(id).style.display='none'); });
}

}
function qBind(){
  const $=id=>document.getElementById(id);
  $('q_pillar').onchange=()=>{ qState.pillar=$('q_pillar').value; qState.gm=CFG.gmDefaults[qState.pillar]; qRefresh(); };
  $('q_ton').onchange=qFillUnits; ['q_mat','q_hrs','q_rent'].forEach(id=>$(id).oninput=qRefresh);
  $('q_cust').oninput=()=>qState.cust=$('q_cust').value;
  $('q_gm').oninput=()=>{ qState.gm=$('q_gm').value/100; qRefresh(false); };
  qFillUnits(); qRefresh();
}
function qFillUnits(){
  const ton=document.getElementById('q_ton').value;
  const list=EQUIPMENT.filter(e=>!ton||e.ton===ton);
  document.getElementById('q_unit').innerHTML=list.map((e,i)=>
    `<option value="${e.model}">${e.ton?e.ton+' Ton — ':''}${e.name} — ${e.model} — ${fmt(e.cost)}</option>`).join('');
}
function qAddEquip(){
  const model=document.getElementById('q_unit').value;
  const e=EQUIPMENT.find(x=>x.model===model);
  if(e) qState.equip.push(e); qRefresh();
}
function qDelEquip(i){ qState.equip.splice(i,1); qRefresh(); }
function qRefresh(resetSlider=true){
  const $=id=>document.getElementById(id);
  qState.matCost=+$('q_mat').value||0; qState.laborHrs=+$('q_hrs').value||0; qState.rentCost=+$('q_rent').value||0;
  const [lo,hi]=CFG.gmRange[qState.pillar];
  if(resetSlider){ $('q_gm').value=Math.round(qState.gm*100); }
  $('q_gmlab').textContent='GM '+Math.round(qState.gm*100)+'%';
  const inBand = qState.gm>=lo-1e-9 && qState.gm<=hi+1e-9;
  $('q_gmnote').innerHTML = inBand
    ? `Inside your normal ${qState.pillar==='aor'?'AOR':'construction'} band (${lo*100}–${hi*100}%).`
    : `<span style="color:var(--warn);font-weight:600">Outside your normal ${lo*100}–${hi*100}% band</span> — your call, the market's your read.`;
  $('q_equiplist').innerHTML = qState.equip.length ? `<table>${qState.equip.map((e,i)=>
    `<tr><td>${e.ton?e.ton+' Ton':''} ${e.name}<br><span style="color:var(--ink3);font-size:12px">${e.model}</span></td>
     <td class="num">${fmt(e.cost)}</td><td style="width:40px"><button class="btn sm sec" onclick="qDelEquip(${i})">✕</button></td></tr>`).join('')}</table>`
    : `<div class="note">No units added yet — pick from the dropdown above.</div>`;
  const equipCost=qState.equip.reduce((s,e)=>s+e.cost,0);
  const m=quoteMath(equipCost,qState.matCost,qState.laborHrs,qState.rentCost,qState.gm);
  $('q_math').innerHTML=`
    <div class="mr"><span class="lbl">Equipment w/ 7% tax</span><span>${fmt(m.eqTax)}</span></div>
    <div class="mr"><span class="lbl">Materials w/ tax, ×1.18 surcharge</span><span>${fmt(m.matSur)}</span></div>
    <div class="mr"><span class="lbl">Rentals w/ tax</span><span>${fmt(m.rentTax)}</span></div>
    <div class="mr"><span class="lbl">Labor ${qState.laborHrs} hrs × $${CFG.laborRate} × ${CFG.laborOverhead} overhead</span><span>${fmt(m.laborOH)}</span></div>
    <div class="mr"><span class="lbl">Total project cost</span><span>${fmt(m.totalCost)}</span></div>
    <div class="mr tot"><span>Bid @ ${Math.round(qState.gm*100)}% GM</span><span>${fmt(m.bid)}</span></div>
    <div class="mr"><span class="lbl">Profit</span><span style="color:var(--good);font-weight:650">${fmt(m.profit)}</span></div>`;
  qOptions(m);
}
function qOptions(){
  const box=document.getElementById('q_options');
  if(!qState.equip.length){ box.innerHTML='<div class="note">Add a unit and the Good / Better / Best options build themselves — same tonnage, three tiers, customer-ready wording.</div>'; return; }
  const base=qState.equip[0];
  const seer = e => { const m=e.name.match(/(\d+)\s*SEER/); return m?+m[1]:0; };
  let pool=EQUIPMENT.filter(e=>e.ton===base.ton && e.cost>500 && e.model.startsWith('5A') && seer(e)>0);
  const bySeries={}; pool.forEach(e=>{ if(!bySeries[e.name]||e.cost<bySeries[e.name].cost) bySeries[e.name]=e; });
  pool=Object.values(bySeries).sort((a,b)=>seer(a)-seer(b)||a.cost-b.cost);
  if(pool.length<3){ box.innerHTML='<div class="note">Not enough same-tonnage alternatives in the loaded price-book sample for a three-option spread.</div>'; return; }
  const picks=[pool[0], pool[Math.floor(pool.length/2)], pool[pool.length-1]];
  const tiers=['Good','Better','Best'];
  box.innerHTML='<h3 style="margin-top:0">Customer options — A / B / C</h3>'+`<div class="opt3">`+picks.map((e,i)=>{
    const m=quoteMath(e.cost + qState.equip.slice(1).reduce((s,x)=>s+x.cost,0), qState.matCost,qState.laborHrs,qState.rentCost,qState.gm);
    return `<div class="opt ${i===1?'rec':''}">
      <div class="tier">${tiers[i]}${i===1?' · recommended':''}</div>
      <div style="font-size:13px">${e.ton?e.ton+' Ton ':''}${e.name}</div>
      <div class="price">${fmt0(m.bid)}</div>
      <div class="vv">${verbiageFor(e.name)}</div>
    </div>`;}).join('')+`</div>
    <div class="note">Every line carries your value-added wording — comfort language, sixth-grade clear, per the July 17 session.</div>`;
}

/* --- Service Ticket --- */
function rService(){
  return `
  <div class="card">
    <h2 class="pillL">Service Ticket</h2>
    <div class="row">
      <div><label>Customer</label><input id="s_cust" placeholder="Name"></div>
      <div><label>Type</label><select id="s_type" onchange="sCalc()"><option value="res">Residential</option><option value="com">Commercial</option></select></div>
      <div><label>Hours beyond the first</label><input id="s_hrs" type="number" min="0" step="0.5" value="0" oninput="sCalc()"></div>
      <div><label>Maintenance member?</label><select id="s_member" onchange="sCalc()"><option value="no">No</option><option value="yes">Yes — 15% off</option></select></div>
    </div>
    <h3>Parts (your cost — the system prices them at 50% margin: cost ÷ 0.5)</h3>
    <div id="s_parts"></div>
    <button class="btn sm sec" onclick="sAddPart()">+ Add part</button>
    <div class="row" style="margin-top:16px">
      <div class="mathbox" id="s_math" style="flex:1"></div>
    </div>
    <div class="note">Diagnostic fee covers the first hour including drive time. Rates are yours to edit in settings — overhead and margin already baked in; the system never recalculates them.</div>
  </div>`;
}
let sParts=[{desc:'Capacitor', cost:18.50}];
function sAddPart(){ sParts.push({desc:'',cost:0}); sCalc(); }
function sDelPart(i){ sParts.splice(i,1); sCalc(); }
function sCalc(){
  const box=document.getElementById('s_parts'); if(!box) return;
  box.innerHTML=sParts.map((p,i)=>`<div class="row" style="margin-bottom:6px">
    <div style="flex:2"><input placeholder="Part description" value="${p.desc}" oninput="sParts[${i}].desc=this.value"></div>
    <div><input type="number" min="0" step="0.01" value="${p.cost||''}" placeholder="Cost" oninput="sParts[${i}].cost=+this.value||0;sCalc()"></div>
    <div style="flex:0 0 auto"><button class="btn sm sec" onclick="sDelPart(${i})">✕</button></div>
  </div>`).join('');
  const t=document.getElementById('s_type').value;
  const diag = t==='res'?CFG.service.diagRes:CFG.service.diagCom;
  const rate = t==='res'?CFG.service.hrRes:CFG.service.hrCom;
  const hrs=+document.getElementById('s_hrs').value||0;
  const labor=hrs*rate;
  const partsCost=sParts.reduce((s,p)=>s+(p.cost||0),0);
  const partsPrice=partsCost/(1-CFG.service.partsMargin);   // 50% MARGIN = cost × 2
  let sub=diag+labor+partsPrice;
  const member=document.getElementById('s_member').value==='yes';
  const disc=member?sub*CFG.service.memberDisc:0;
  sub-=disc;
  const tax=sub*CFG.taxRate, total=sub+tax;
  document.getElementById('s_math').innerHTML=`
    <div class="mr"><span class="lbl">Diagnostic fee (first hour + drive time)</span><span>${fmt(diag)}</span></div>
    <div class="mr"><span class="lbl">Labor: ${hrs} hrs × $${rate}</span><span>${fmt(labor)}</span></div>
    <div class="mr"><span class="lbl">Parts at 50% margin (cost ${fmt(partsCost)} × 2)</span><span>${fmt(partsPrice)}</span></div>
    ${member?`<div class="mr"><span class="lbl">Member discount −15%</span><span style="color:var(--good)">−${fmt(disc)}</span></div>`:''}
    <div class="mr"><span class="lbl">NC sales tax 7%</span><span>${fmt(tax)}</span></div>
    <div class="mr tot"><span>Ticket total</span><span>${fmt(total)}</span></div>
    <div class="mr"><span class="lbl">Approval</span><span><button class="btn sm" onclick="alert('Timestamped: '+new Date().toLocaleString()+'\\n\\nCustomer approval recorded — the legal timestamp from your meeting. A fast-path (Don\\'t worry about the money) button will sit beside this for trusted accounts.')">Customer approves — timestamp</button></span></div>`;
}

function maintPrice(type,sys){ return type==='res' ? CFG.maint.res1+(sys-1)*CFG.maint.resAddl : CFG.maint.com1+(sys-1)*CFG.maint.comAddl; }
function mCalc(){
  const type=document.getElementById('m_type').value, sys=Math.max(1,+document.getElementById('m_sys').value||1);

  document.getElementById('m_math').innerHTML=`
    <div class="mr"><span class="lbl">${type==='res'?'Residential':'Commercial'} — first system</span><span>${fmt(type==='res'?CFG.maint.res1:CFG.maint.com1)}</span></div>
    ${sys>1?`<div class="mr"><span class="lbl">${sys-1} additional × ${fmt(type==='res'?CFG.maint.resAddl:CFG.maint.comAddl)}</span><span>${fmt((sys-1)*(type==='res'?CFG.maint.resAddl:CFG.maint.comAddl))}</span></div>`:''}
    <div class="mr"><span class="lbl">NC sales tax 7%</span><span>${fmt(tax)}</span></div>
    <div class="mr tot"><span>Billed annually at signing</span><span>${fmt(pre+tax)}</span></div>

function mList(){
  const tb=document.getElementById('m_list'); if(!tb) return;
  tb.innerHTML=agreements.map(a=>`<tr><td>${a.cust}</td>

function mSign(){
  const cust=document.getElementById('m_cust').value||'New Customer';
  const type=document.getElementById('m_type').value, sys=Math.max(1,+document.getElementById('m_sys').value||1);
  const d1=new Date(); d1.setDate(d1.getDate()+14);

  agreements.push({id:agreements.length+1,cust,type,systems:sys,signed:f(new Date()),v1:f(d1),v2:f(d2),status:'active'});
